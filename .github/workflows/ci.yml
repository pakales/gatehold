name: Gatehold CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"
          cache: npm
      - run: uv sync --all-groups --locked
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run verify
